<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Lock browser zoom so pinch-gestures go to our canvas, not the page.
      viewport-fit=cover fills the iPhone safe areas (notch, home bar).
      interactive-widget=resizes-content keeps the iOS keyboard from
      pushing our phone-shell off-screen.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      /* Prevent double-tap-to-zoom and rubber-band scroll on iOS.
         The canvas handles its own pinch/zoom internally. */
      html, body {
        touch-action: manipulation;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>GRVD — Companion DAW</title>
  </head>
  <body class="bg-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
